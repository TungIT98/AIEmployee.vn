# Logstash Pipeline for AIEmployee API Logs
# Receives JSON logs from API and ships to Elasticsearch

input {
  # HTTP input for JSON logs from API
  http {
    port => 5044
    codec => json
    type => api_log
  }

  # Beats input (for Filebeat if used)
  beats {
    port => 5045
    type => filebeat
  }
}

filter {
  # Parse timestamp
  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  # Add index name based on log type
  if [type] == "api_log" {
    mutate {
      add_field => { "[@metadata][index_prefix]" => "aiemployee-logs" }
    }
  }

  # Categorize logs by type for easier searching
  if [type] == "login" or [type] == "LOGIN" {
    mutate {
      add_tag => [ "security", "authentication" ]
      add_field => { "[@metadata][index_suffix]" => "auth" }
    }
  }

  if [type] == "access" or [type] == "ACCESS" {
    mutate {
      add_tag => [ "api", "access" ]
      add_field => { "[@metadata][index_suffix]" => "access" }
    }
  }

  if [type] == "error" or [type] == "ERROR" {
    mutate {
      add_tag => [ "api", "error" ]
      add_field => { "[@metadata][index_suffix]" => "error" }
    }
  }

  if [type] == "change" or [type] == "CHANGE" {
    mutate {
      add_tag => [ "data", "change" ]
      add_field => { "[@metadata][index_suffix]" => "change" }
    }
  }

  # Handle security events (failed auth, rate limits)
  if [tags] and "security" in [tags] {
    mutate {
      add_tag => [ "security_event" ]
      add_field => { "[@metadata][index_suffix]" => "security" }
    }
  }

  # Set default index suffix
  if ![@metadata][index_suffix] {
    mutate {
      add_field => { "[@metadata][index_suffix]" => "general" }
    }
  }

  # Enrich with geoip if ipAddress is present
  if [ipAddress] and [ipAddress] != "" {
    geoip {
      source => "ipAddress"
      target => "geo"
    }
  }

  # Parse user agent if present
  if [userAgent] and [userAgent] != "" {
    useragent {
      source => "userAgent"
      target => "userAgentParsed"
    }
  }

  # Add processing metadata
  mutate {
    add_field => {
      "[@metadata][index_name]" => "%{[@metadata][index_prefix]}-%{[@metadata][index_suffix]}-%{+YYYY.MM.dd}"
      "processed_at" => "%{+YYYY-MM-dd'T'HH:mm:ss.SSSZ}"
    }
  }
}

output {
  # Ship to Elasticsearch with ILM
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "%{[@metadata][index_name]}"
    document_type => "_doc"

    # ILM settings
    ilm_enabled => true
    ilm_rollover_alias => "aiemployee-logs"
    ilm_pattern => "000001"
    ilm_policy => "aiemployee-logs-policy"

    # Template settings
    template_name => "aiemployee-logs-template"
    template_overwrite => true
  }

  # Debug output (comment out in production)
  # stdout {
  #   codec => rubydebug
  # }
}
