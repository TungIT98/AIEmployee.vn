name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install HTML validators
        run: |
          pip install html5-parser chardet

      - name: Validate HTML files
        run: |
          python .github/workflows/validate_html.py products/aiemployee-vn/index.html

  check-links:
    name: Check external links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install link checker
        run: pip install requests

      - name: Check internal links
        run: python .github/workflows/check_links.py products/aiemployee-vn/index.html

  lint-javascript:
    name: Lint JavaScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ESLint
        run: npm install -g eslint@8

      - name: Extract and lint inline JS
        run: |
          sed -n '/<script>/,/<\/script>/p' products/aiemployee-vn/index.html | sed '1d;$d' > temp.js
          eslint temp.js --no-eslintrc --env browser,es2021
          rm -f temp.js

  api-jest-tests:
    name: API Jest unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        run: npx jest --ci --coverage