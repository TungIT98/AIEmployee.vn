name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Deploy API to Cloudflare Workers
  # ============================================
  deploy-api:
    name: Deploy API to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        working-directory: ./api
        run: npm ci

      - name: Build API
        working-directory: ./api
        run: npm run build
        env:
          NODE_ENV: production

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./api
          environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

  # ============================================
  # Deploy Frontend to Cloudflare Pages
  # ============================================
  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: products/aiemployee-vn/package-lock.json

      - name: Install dependencies
        working-directory: ./products/aiemployee-vn
        run: npm ci

      - name: Build Frontend
        working-directory: ./products/aiemployee-vn
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ github.ref == 'refs/heads/main' && 'https://api.aiemployee.vn' || 'https://staging-api.aiemployee.vn' }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: aiemployee-frontend
          directory: ./products/aiemployee-vn/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

  # ============================================
  # Deploy n8n Workflows (if exists)
  # ============================================
  deploy-n8n:
    name: Deploy n8n Workflows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy n8n workflows via API
        run: |
          curl -X POST "https://n8n.aiemployee.vn/webhook/sync-workflows" \
            -H "Authorization: Bearer ${{ secrets.N8N_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{"repository": "${{ github.repository }}", "ref": "${{ github.sha }}"}'
        continue-on-error: true

  # ============================================
  # Notify deployment status
  # ============================================
  notify:
    name: Notify deployment
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-frontend]
    steps:
      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "### API (Cloudflare Workers)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.deploy-api.result }}" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend (Cloudflare Pages)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ needs.deploy-frontend.result }}" >> $GITHUB_STEP_SUMMARY
          echo "### URLs" >> $GITHUB_STEP_SUMMARY
          echo "- Staging API: https://staging-api.aiemployee.vn" >> $GITHUB_STEP_SUMMARY
          echo "- Staging Frontend: https://staging.aiemployee.vn" >> $GITHUB_STEP_SUMMARY
          echo "- Production API: https://api.aiemployee.vn" >> $GITHUB_STEP_SUMMARY
          echo "- Production Frontend: https://aiemployee.vn" >> $GITHUB_STEP_SUMMARY
