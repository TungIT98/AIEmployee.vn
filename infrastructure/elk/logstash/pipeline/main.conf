# Logstash Pipeline Configuration
# Process and forward logs to Elasticsearch

input {
  beats {
    port => 5044
  }

  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }
  }

  # Add metadata
  mutate {
    add_field => {
      "[@metadata][index_prefix]" => "logs"
      "environment" => "${ENVIRONMENT:production}"
      "region" => "${REGION:us-east-1}"
    }
  }

  # Parse timestamp
  date {
    match => [ "[parsed][timestamp]", "ISO8601" ]
    target => "@timestamp"
  }

  # Add log level processing
  if [parsed][level] {
    mutate {
      add_field => { "log_level" => "%{[parsed][level]}" }
    }
  }

  # Handle errors specifically
  if [parsed][level] == "error" OR [parsed][level] == "ERROR" {
    mutate {
      add_tag => [ "error" ]
    }
  }

  # Extract service name if present
  if [parsed][service] {
    mutate {
      add_field => { "service_name" => "%{[parsed][service]}" }
    }
  }

  # Normalize kubernetes metadata if present
  if [parsed][kubernetes] {
    mutate {
      add_field => {
        "k8s_namespace" => "%{[parsed][kubernetes][namespace]}"
        "k8s_pod" => "%{[parsed][kubernetes][pod]}"
      }
    }
  }
}

output {
  # Output to Elasticsearch (master in primary region)
  elasticsearch {
    hosts => ["${ES_HOSTS:elasticsearch-master:9200}"]
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    user => "${ES_USER:elastic}"
    password => "${ES_PASSWORD}"
    ssl => true
    ssl_certificate_verification => true
    cacert => "/usr/share/logstash/certs/ca.crt"
    retry_on_conflict => 5
  }

  # Also output to replica for cross-region replication
  # (CCR will handle replication, this is just for direct access)
  if "${ENABLE_SECONDARY_ES:-false}" == "true" {
    elasticsearch {
      hosts => ["${ES_REPLICA_HOST:elasticsearch-replica:9201}"]
      index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
      user => "${ES_USER:elastic}"
      password => "${ES_PASSWORD}"
      ssl => true
      ssl_certificate_verification => true
      cacert => "/usr/share/logstash/certs/ca.crt"
    }
  }

  # Debug output (disable in production)
  if "${DEBUG_LOGSTASH:-false}" == "true" {
    stdout {
      codec => rubydebug
    }
  }
}