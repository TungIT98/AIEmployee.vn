#===============================================================================
# 3-2-1 Backup Configuration
# AIEmployee Global Infrastructure
#===============================================================================
# The 3-2-1 Rule: 3 copies of data, on 2 different types of media,
# with 1 copy offsite
#===============================================================================

# ----------------------------------------------------------------------------
# Backup Sources
# ----------------------------------------------------------------------------
BACKUP_SOURCES:
  - name: elasticsearch
    type: database
    endpoints:
      - http://elasticsearch-master:9200
      - http://elasticsearch-replica:9201
    includes:
      - .kibana*
      - logs-*
      - metrics-*
    excludes:
      - .security*
    credentials:
      username: elastic
      password_env: ES_PASSWORD

  - name: application_data
    type: filesystem
    paths:
      - /data/application
      - /data/uploads
    excludes:
      - "**/tmp/**"
      - "**/cache/**"
      - "**/*.tmp"

  - name: configuration
    type: config
    paths:
      - /config
      - /infrastructure
    compress: true

  - name: docker_volumes
    type: volume
    volumes:
      - elasticsearch-data
      - es-master-data
      - es-replica-data

# ----------------------------------------------------------------------------
# Backup Destinations (2 different types of media)
# ----------------------------------------------------------------------------
BACKUP_DESTINATIONS:

  # Destination 1: AWS S3 (Cloud Storage)
  - name: s3-primary
    type: s3
    enabled: true
    region: us-east-1
    bucket: aiemployee-backups-primary
    prefix: "backups/"
    storage_class: STANDARD
    encryption: AES256
    lifecycle:
      retention_days: 30
      transition_to_glacier_days: 7

  - name: s3-secondary
    type: s3
    enabled: true
    region: eu-west-1
    bucket: aiemployee-backups-eu
    prefix: "backups/"
    storage_class: STANDARD
    encryption: AES256
    lifecycle:
      retention_days: 90
      transition_to_glacier_days: 30

  # Destination 2: Azure Blob Storage (Alternative Cloud)
  - name: azure-backup
    type: azure
    enabled: false
    storage_account: aiemployeebackups
    container: backups
    prefix: "aiemployee/"
    access_tier: cool
    lifecycle:
      retention_days: 60

# ----------------------------------------------------------------------------
# Backup Schedule (3 copies maintained via retention policies above)
# ----------------------------------------------------------------------------
BACKUP_SCHEDULE:
  # Full backup - daily at 02:00 UTC
  full_backup:
    schedule: "0 2 * * *"
    enabled: true
    priority: high
    timeout: 4h
    verify: true

  # Incremental backup - every 6 hours
  incremental_backup:
    schedule: "0 */6 * * *"
    enabled: true
    priority: normal
    timeout: 1h
    verify: false

  # Elasticsearch snapshot - every 4 hours
  es_snapshot:
    schedule: "0 */4 * * *"
    enabled: true
    priority: high
    timeout: 30m
    verify: true
    repository: s3-backup

  # Configuration backup - every 12 hours
  config_backup:
    schedule: "0 */12 * * *"
    enabled: true
    priority: low
    timeout: 15m
    verify: true

# ----------------------------------------------------------------------------
# Restoration Testing (3-2-1 compliance: 1 copy must be tested)
# ----------------------------------------------------------------------------
RESTORATION_TESTING:
  enabled: true
  schedule: "0 3 * * 0"  # Weekly on Sunday at 03:00 UTC

  tests:
    - name: elasticsearch_restore
      source: s3-primary
      target: elasticsearch-test
      timeout: 2h
      verify_indices:
        - .kibana
        - logs-*

    - name: file_restore
      source: s3-primary
      target: /tmp/restore-test
      timeout: 30m
      verify_checksum: true

    - name: full_drill
      source: s3-secondary
      target: new-region
      simulate_failover: true
      timeout: 4h

  notifications:
    on_success: true
    on_failure: true
    channels:
      - slack_alerts
      - email_ops

  # Last restoration test
  last_test_date: null
  last_test_result: null

# ----------------------------------------------------------------------------
# Offsite Backup (1 copy offsite - eu-west-1 satisfies this for US regions)
# ----------------------------------------------------------------------------
OFFSITE_REQUIREMENTS:
  enabled: true
  minimum_distance: "500 km"
  satisfied_by:
    - s3-secondary  # EU region satisfies offsite requirement

  # For strict compliance, can add tape/paper backup:
  # - name: tape_archive
  #   type: physical
  #   location: "secure_offsite_vault"
  #   schedule: monthly

# ----------------------------------------------------------------------------
# Recovery Objectives
# ----------------------------------------------------------------------------
RECOVERY_OBJECTIVES:
  # RPO (Recovery Point Objective) - maximum data loss acceptable
  RPO:
    elasticsearch: "15 minutes"
    application_data: "1 hour"
    configuration: "24 hours"

  # RTO (Recovery Time Objective) - maximum downtime acceptable
  RTO:
    critical_services: "30 minutes"
    standard_services: "2 hours"
    full_recovery: "4 hours"

# ----------------------------------------------------------------------------
# Retention Policies
# ----------------------------------------------------------------------------
RETENTION_POLICIES:
  # Follows 3-2-1 rule implementation
  daily_backups: 7      # Keep 7 daily backups
  weekly_backups: 4     # Keep 4 weekly backups
  monthly_backups: 12   # Keep 12 monthly backups
  yearly_backups: 7     # Keep 7 yearly backups

  # Elasticsearch snapshots
  hourly_snapshots: 24  # Keep 24 hourly
  daily_snapshots: 7    # Keep 7 daily
  weekly_snapshots: 4   # Keep 4 weekly

  # Compliance retention
  audit_logs: "7 years"
  access_logs: "3 years"

# ----------------------------------------------------------------------------
# Backup Verification
# ----------------------------------------------------------------------------
VERIFICATION:
  enabled: true
  method: checksum
  algorithm: SHA256

  # Integrity checks
  pre_backup_checksum: true
  post_backup_checksum: true
  restore_verification: true

  # Alerts
  alert_on_failure: true
  alert_on_slow_backup: true  # If backup takes > expected time

# ----------------------------------------------------------------------------
# Security
# ----------------------------------------------------------------------------
SECURITY:
  # Encryption at rest
  encrypt_at_rest: true
  encryption_key_provider: aws-kms
  key_id: alias/aiemployee-backup-key

  # Encryption in transit
  encrypt_in_transit: true
  tls_min_version: "1.2"

  # Access control
  restrict_access: true
  iam_roles:
    - backup-service-role

  # Audit logging
  audit_logging: true
  log_bucket: aiemployee-audit-logs

# ----------------------------------------------------------------------------
# Compliance
# ----------------------------------------------------------------------------
COMPLIANCE:
  # GDPR compliance for EU data
  gdpr_compliant: true
  data_residency:
    eu_data: eu-west-1
    us_data: us-east-1

  # ISO 27001 alignment
  iso27001_controls:
    - A.12.3.1 (Information backup)
    - A.17.1.1 (Planning for continuity)

  # SOC 2 alignment
  soc2_controls:
    - CC6.6 (Backup and recovery)
    - CC9.2 (Recovery testing)

# ----------------------------------------------------------------------------
# Monitoring & Alerts
# ----------------------------------------------------------------------------
MONITORING:
  # Prometheus metrics endpoint
  metrics_port: 9090
  metrics_path: /metrics

  # Key metrics to track
  metrics:
    - backup_duration_seconds
    - backup_size_bytes
    - backup_failures_total
    - restore_duration_seconds
    - restoration_tests_total
    - storage_usage_bytes

  # Alert rules
  alerts:
    - name: backup_failed
      condition: backup_status == "failed"
      severity: critical
      notification: pagerduty

    - name: backup_overdue
      condition: time_since_last_backup > 25h
      severity: high
      notification: slack

    - name: restore_test_failed
      condition: restore_verification == "failed"
      severity: critical
      notification: pagerduty

    - name: storage_low
      condition: storage_usage_percent > 80
      severity: medium
      notification: slack

# ----------------------------------------------------------------------------
# Snapshot Configuration (for Elasticsearch)
# ----------------------------------------------------------------------------
ELASTICSEARCH_SNAPSHOTS:
  repository_type: s3
  repository_config:
    bucket: aiemployee-es-snapshots
    region: us-east-1
    base_path: snapshots
    compress: true
    chunk_size: 256mb

  # Snapshot lifecycle management
  slm:
    enabled: true
    retention:
      min_count: 7
      max_count: 14
      age: "7d"

  # Index selection for snapshots
  include_indices:
    - logs-*
    - metrics-*
    - .kibana*

  exclude_indices:
    - .security*
    - .tasks*

# ----------------------------------------------------------------------------
# Emergency Procedures
# ----------------------------------------------------------------------------
EMERGENCY_CONTACTS:
  backup_vendor_support:
    name: AWS Support
    phone: "+1-866-777-8920"
    tier: enterprise

  recovery_specialist:
    name: DevOps Team
    slack: "#devops-emergency"
    email: devops@example.com

  escalation:
    name: CTO
    email: cto@example.com
